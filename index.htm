<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>CYP135 推薦登錄</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        /* =========================================
           1. 全域與美學設定
           ========================================= */
        :root { --main-dark: #000000; --sub-gray: #BBBBBB; --bg-light: #F8F9FA; --border: #E0E0E0; --active-line: #000000; }
        
        body { background: var(--bg-light); color: var(--main-dark); font-family: -apple-system, "Noto Sans TC", sans-serif; margin: 0; line-height: 1.6; }
        
        /* 🚀 修正：極簡分頁標籤 (Tabs) - 選中黑、未選灰、有靈魂底線 */
        .tab-bar { display: flex; background: #fff; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
        .tab { flex: 1; text-align: center; padding: 18px 0; font-size: 15px; color: var(--sub-gray); cursor: pointer; transition: 0.3s; position: relative; }
        .tab.active { color: var(--main-dark); font-weight: bold; }
        .tab.active::after { content: ""; position: absolute; bottom: 0; left: 25%; width: 50%; height: 2px; background: var(--active-line); }

        .container { padding: 30px 20px; max-width: 600px; margin: 0 auto; }
        h2 { font-weight: 700; font-size: 26px; margin-bottom: 10px; letter-spacing: -0.5px; }
        .subtitle { font-size: 14px; color: #666; margin-bottom: 30px; border-left: 3px solid var(--main-dark); padding-left: 12px; }

        /* 卡片與名單樣式 */
        .group-header { font-size: 13px; color: #666; margin: 25px 0 10px 5px; font-weight: bold; display: flex; align-items: center; }
        .group-header::before { content: "📍"; margin-right: 5px; }
        
        .card { background: #fff; padding: 20px; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.02); display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .card:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(0,0,0,0.07); }
        .card-info { flex: 1; }
        .card-name { font-weight: bold; font-size: 18px; }
        .card-sub { font-size: 12px; color: #999; margin-top: 4px; }
        
        /* 🚀 新增：已達標卡片樣式 (灰階、不可點選) */
        .card.done { opacity: 0.5; filter: grayscale(1); pointer-events: none; }
        
        /* 🚀 新增：極簡三角形抽屜開關 */
        .drawer-toggle { text-align: center; color: var(--sub-gray); font-size: 12px; margin-top: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .drawer-toggle span { margin-right: 5px; text-decoration: underline; }
        
        /* 表單元素 */
        .group { margin-bottom: 25px; }
        label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: #333; }
        input, select { width: 100%; border: none; border-bottom: 2px solid var(--border); background: transparent; padding: 10px 0; font-size: 17px; outline: none; border-radius: 0; box-sizing: border-box; }
        input:focus { border-bottom: 2px solid var(--main-dark); }
        
        .btn { width: 100%; background: var(--main-dark); color: #fff; border: none; padding: 18px; border-radius: 8px; font-size: 17px; font-weight: 700; letter-spacing: 2px; cursor: pointer; transition: 0.2s; }
        .btn:disabled { background: #CCC; opacity: 0.7; }

        /* 🚀 修正：嚴格門禁彈窗 (Modal) - 美化遮罩與樣式 */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .modal-content { background: #fff; border-radius: 20px; padding: 35px; width: 100%; max-width: 320px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
        .modal-header { font-size: 20px; font-weight: bold; margin-bottom: 15px; }
        .modal-body { color: #666; font-size: 15px; line-height: 1.6; }

        #loading { position: fixed; inset: 0; background: #fff; z-index: 999; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #999; }
    </style>
</head>
<body>

<div id="loading">系統讀取中...</div>

<div id="gatekeeper" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">CYP135 推薦登錄</div>
        <div class="modal-body">您尚未報名推薦競賽<br>請洽詢小組長完成報名。</div>
        <button class="btn" style="margin-top:25px; padding:12px;" onclick="liff.closeWindow()">確定並離開</button>
    </div>
</div>

<div class="tab-bar">
    <div class="tab active" id="t-ref" onclick="switchTab('ref')">成功推薦</div>
    <div class="tab" id="t-cons" onclick="switchTab('cons')">增加消費</div>
    <div class="tab" id="t-adm" style="display:none" onclick="switchTab('adm')">會長專區</div>
</div>

<div class="container">
    <div id="ref" class="page">
        <h2 id="ref-title">成功推薦登記</h2>
        <div class="subtitle" id="ref-hint">載入中...</div>
        <form id="refForm">
            <div class="group"><label>推薦人 (參賽夥伴)</label><select id="inv-select" required></select></div>
            <div class="group"><label>新人編號</label><input type="number" id="tarId" placeholder="請輸入安麗編號" required></div>
            <div class="group"><label>新人姓名</label><input type="text" id="tarName" placeholder="例如：王小明" required></div>
            <div class="group"><label>加入日期</label><input type="date" id="tarDate" min="2026-03-01" max="2026-05-31" required></div>
            <div class="group"><label>首購金額</label><input type="number" id="tarAmt" placeholder="本次消費金額" required></div>
            <div class="group"><label>憑證上傳</label><input type="file" id="tarImg" accept="image/*"></div>
            <button class="btn" type="submit" id="btn-ref">提交數據</button>
        </form>
    </div>

    <div id="cons" class="page" style="display:none">
        <h2>增加消費金額</h2>
        <div class="subtitle">僅顯示未滿 3000 元之夥伴 (依推薦人排序)</div>
        
        <div id="member-list"></div>
        
        <div class="drawer-toggle" onclick="toggleDoneList()">
            <span>顯示已達標夥伴</span> <font id="drawer-icon">▼</font>
        </div>
        
        <div id="done-list" style="display:none; margin-top:15px; border-top:1px solid #EEE; padding-top:10px;"></div>
        
        <div id="cons-form-area" style="display:none; margin-top:40px; border-top:1px dashed #DDD; padding-top:30px;">
            <h3 id="selected-name" style="font-weight:700; margin-bottom: 20px;"></h3>
            <form id="submitConsForm">
                <input type="hidden" id="cTarId"><input type="hidden" id="cTarName">
                <div class="group"><label>本次補填消費金額</label><input type="number" id="cAmt" required></div>
                <div class="group"><label>消費憑證</label><input type="file" id="cImg" accept="image/*" required></div>
                <button class="btn" type="submit" id="btn-cons">確認提交</button>
            </form>
        </div>
    </div>

    <div id="adm" class="page" style="display:none">
        <h2>會長專區</h2>
        <div class="tab-bar" style="position: relative; margin-bottom:20px; border:none; background:transparent;">
            <div class="tab active" style="padding:10px" onclick="subTab('pending', this)">待審核</div>
            <div class="tab" style="padding:10px" onclick="subTab('stats', this)">績效統計</div>
            <div class="tab" style="padding:10px" onclick="subTab('roster', this)">參賽名單</div>
        </div>
        <div id="admin-content"></div>
    </div>
</div>

<script>
    // =========================================
    // 2. 核心變數與初始化
    // =========================================
    const LIFF_ID = '2009757859-5wc8ZiNA'; // 務必填寫 LIFF ID
    const GAS_URL = '你的_GAS_網址'; // 務必更換為正式網址

    let state = { user: null, participants: [], newbies: [], isAdmin: false, uid: "" };
    let isDoneListVisible = false; // 追蹤抽屜狀態

    async function init() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            const profile = await liff.getProfile();
            state.uid = profile.userId;
            
            await refreshData();
            document.getElementById('loading').style.display = 'none';
        } catch (err) { alert("系統初始化失敗，請重新整理。"); }
    }

    // =========================================
    // 3. 資料處理與 UI 渲染
    // =========================================
    async function refreshData() {
        try {
            const res = await fetch(`${GAS_URL}?action=getInitData&uid=${state.uid}`);
            const result = await res.json();
            
            // 🚨 門禁第二關：若 GAS 回傳未註冊，開啟門禁彈窗
            if (result.data && result.data.error === "未註冊") {
                document.getElementById('gatekeeper').style.display = 'flex';
                return;
            }

            if (!result.success) { alert(`雲端錯誤: ${result.message}`); return; }

            state.user = result.data.myProfile;
            state.participants = result.data.participants;
            state.newbies = result.data.newbies; // 這是已經排序好的所有資料
            state.isAdmin = result.data.isPresident;
            renderUI();
        } catch(e) { console.error("資料刷新失敗", e); alert("網路連線異常。"); }
    }

    function renderUI() {
        // A. 成功推薦頁面標題優化
        document.getElementById('ref-title').innerText = `選擇「${state.user.group}」推薦者`;
        document.getElementById('ref-hint').innerText = `管理小組：${state.user.group}`;
        document.getElementById('inv-select').innerHTML = state.participants.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
        
        // B. 增加消費頁面：重組名單邏輯 (核心清單 vs 抽屜清單)
        const mainList = document.getElementById('member-list');
        const doneList = document.getElementById('done-list');
        
        mainList.innerHTML = '';
        doneList.innerHTML = '';
        
        let currentInvMain = '';
        let currentInvDone = '';

        // 核心邏輯：依照「推薦人分組排序」，並將「已達標」丟進抽屜
        state.newbies.forEach(m => {
            const spentAmt = Number(m.spent);
            const isDone = spentAmt >= 3000;

            if (!isDone) {
                // 1. 未達標者 -> 放進核心清單
                if (m.invName !== currentInvMain) {
                    currentInvMain = m.invName;
                    const header = document.createElement('div');
                    header.className = 'group-header';
                    header.innerText = `推薦人：${currentInvMain}`;
                    mainList.appendChild(header);
                }
                const card = createCard(m, false);
                mainList.appendChild(card);
            } else {
                // 2. 已達標者 -> 放進抽屜清單
                if (m.invName !== currentInvDone) {
                    currentInvDone = m.invName;
                    const header = document.createElement('div');
                    header.className = 'group-header';
                    header.innerText = `推薦人：${currentInvDone}`;
                    header.style.color = "#BBB"; // 抽屜標頭顏色也淡化
                    doneList.appendChild(header);
                }
                const card = createCard(m, true);
                doneList.appendChild(card);
            }
        });

        // C. 開啟會長專區 Tab
        if (state.isAdmin) document.getElementById('t-adm').style.display = 'block';
    }

    // 通用卡片建立函式
    function createCard(data, isDone) {
        const card = document.createElement('div');
        card.className = `card ${isDone ? 'done' : ''}`;
        
        // 未達標才能點擊
        if (!isDone) {
            card.onclick = () => selectForCons(data.tarId, data.tarName);
        }

        card.innerHTML = `
            <div class="card-info">
                <div class="card-name">${data.tarName}</div>
                <div class="card-sub">累計：$${data.spent} ${isDone ? '(已達標 ✔️)' : ''}</div>
            </div>
            ${isDone ? '' : '<div style="color:var(--main-dark); font-weight:bold; font-size:14px; text-decoration:underline;">補填 ➔</div>'}
        `;
        return card;
    }

    // =========================================
    // 4. UX 功能與頁面控制
    // =========================================
    
    // 🚀 修正：極簡三角形抽屜開關邏輯 (▼ / ▲)
    function toggleDoneList() {
        const drawer = document.getElementById('done-list');
        const icon = document.getElementById('drawer-icon');
        const text = document.querySelector('.drawer-toggle span');
        
        isDoneListVisible = !isDoneListVisible;
        
        if (isDoneListVisible) {
            drawer.style.display = 'block';
            icon.innerText = '▲'; // 向上三角形
            text.innerText = '隱藏已達標夥伴';
            // 彈出時平滑捲動一下
            window.scrollBy({ top: 150, behavior: 'smooth' });
        } else {
            drawer.style.display = 'none';
            icon.innerText = '▼'; // 向下三角形
            text.innerText = '顯示已達標夥伴';
        }
    }

    function selectForCons(id, name) {
        document.getElementById('cons-form-area').style.display = 'block';
        document.getElementById('selected-name').innerText = `為「${name}」補填消費`;
        document.getElementById('cTarId').value = id;
        document.getElementById('cTarName').value = name;
        // 捲動到表單位置
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function switchTab(id) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.querySelectorAll('.tab-bar > .tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        document.getElementById('t-' + id).classList.add('active');
        // 隱藏可能開啟的消費表單
        document.getElementById('cons-form-area').style.display = 'none';
    }

    window.onload = init;
</script>
</body>
</html>
